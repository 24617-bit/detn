<!DOCTYPE html>
<html lang="fr" class="dark overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Démographie · Mauritanie</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: ["class"],
            theme: {
                extend: {
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        primary: {
                            DEFAULT: "hsl(var(--primary))",
                            foreground: "hsl(var(--primary-foreground))",
                        },
                        secondary: {
                            DEFAULT: "hsl(var(--secondary))",
                            foreground: "hsl(var(--secondary-foreground))",
                        },
                        destructive: {
                            DEFAULT: "hsl(var(--destructive))",
                            foreground: "hsl(var(--destructive-foreground))",
                        },
                        muted: {
                            DEFAULT: "hsl(var(--muted))",
                            foreground: "hsl(var(--muted-foreground))",
                        },
                        accent: {
                            DEFAULT: "hsl(var(--accent))",
                            foreground: "hsl(var(--accent-foreground))",
                        },
                        card: {
                            DEFAULT: "hsl(var(--card))",
                            foreground: "hsl(var(--card-foreground))",
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'Tajawal', 'sans-serif'],
                        display: ['Outfit', 'Tajawal', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Scripts de langue et de theme -->
    <script src="/static/js/i18n.js"></script>
    <script>
        // Appliquer immediatement le theme stocke pour eviter le clignotement
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // Appliquer immediatement la langue stockee pour eviter le clignotement
        const lang = localStorage.getItem('lang') || 'fr';
        document.documentElement.lang = lang;
        if (lang === 'ar') {
            document.documentElement.dir = 'rtl';
            document.documentElement.classList.add('rtl');
        } else {
            document.documentElement.dir = 'ltr';
            document.documentElement.classList.remove('rtl');
        }
    </script>
</head>
<body class="min-h-screen bg-background font-sans antialiased overflow-x-hidden">
    <header class="sticky top-0 z-50 w-full border-b border-border bg-background/80 backdrop-blur-md">
        <div class="container mx-auto flex h-16 items-center px-4 justify-between">
            <a href="/" class="flex items-center gap-3">
                <span class="flex h-9 w-9 items-center justify-center rounded-lg bg-primary text-primary-foreground">
                    <i data-lucide="activity" class="h-5 w-5"></i>
                </span>
                <span class="font-display font-bold" data-i18n="nav-title">Démographie · Mauritanie</span>
            </a>
            
            <div class="flex items-center gap-2 sm:gap-4">
                <nav class="hidden md:flex items-center gap-6 text-sm font-medium">
                    <a href="/" class="text-foreground/80 hover:text-foreground transition" data-i18n="nav-home">Accueil</a>
                    <a href="/statistiques" class="text-foreground/80 hover:text-foreground transition" data-i18n="nav-stats">Statistiques RGPH</a>
                </nav>
                
                <div class="flex items-center gap-2 border-l border-border pl-2 sm:pl-4">
                    <!-- Bouton Traduction (Segmented Control) -->
                    <div class="flex items-center rounded-lg border border-border bg-secondary/50 p-1">
                        <button id="lang-fr" class="flex h-7 items-center justify-center rounded bg-background shadow-sm px-3 text-xs font-bold text-foreground transition-colors" onclick="setLanguage('fr')">
                            FR
                        </button>
                        <button id="lang-ar" class="flex h-7 items-center justify-center rounded px-3 text-xs font-bold text-muted-foreground hover:text-foreground transition-colors" onclick="setLanguage('ar')">
                            عربي
                        </button>
                    </div>

                    <!-- Bouton Theme -->
                    <button id="theme-toggle" class="flex h-9 w-9 items-center justify-center rounded-lg border border-border bg-secondary/50 text-foreground/80 hover:text-foreground transition">
                        <i data-lucide="sun" class="hidden dark:block h-4 w-4"></i>
                        <i data-lucide="moon" class="block dark:hidden h-4 w-4"></i>
                    </button>

                    <a href="/login" class="inline-flex items-center justify-center rounded-lg bg-primary px-3 py-1.5 sm:px-4 sm:py-2 text-primary-foreground font-semibold hover:brightness-110 transition text-xs sm:text-sm" data-i18n="nav-login">Connexion</a>
                </div>
                
                <button id="mobile-menu-btn" class="md:hidden flex items-center justify-center p-2 text-foreground/80 hover:text-foreground transition rounded-md hover:bg-secondary/50">
                    <i data-lucide="menu" class="h-6 w-6"></i>
                </button>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden border-t border-border bg-background/95 backdrop-blur-md px-4 py-4 space-y-4 shadow-lg absolute w-full left-0 top-16">
            <a href="/" class="block text-sm font-medium text-foreground/80 hover:text-foreground transition" data-i18n="nav-home">Accueil</a>
            <a href="/statistiques" class="block text-sm font-medium text-foreground/80 hover:text-foreground transition" data-i18n="nav-stats">Statistiques RGPH</a>
        </div>
    </header>

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <script>
        lucide.createIcons();
        
        // Toggle mobile menu
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }

        // Theme switching logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = localStorage.getItem('theme') || 'dark';
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                localStorage.setItem('theme', newTheme);
                
                if (newTheme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                
                // Re-create icons to show sun/moon correctly
                lucide.createIcons();
            });
        }

        // Language switching logic
        window.setLanguage = function(newLang) {
            localStorage.setItem('lang', newLang);
            window.translatePage();
            window.dispatchEvent(new CustomEvent('langChanged', { detail: { lang: newLang } }));
        };

        // Run translate once DOM is ready (in case dynamically generated elements)
        document.addEventListener('DOMContentLoaded', () => {
            window.translatePage();
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
